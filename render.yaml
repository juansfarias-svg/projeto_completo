services:
  - type: web
    name: extrator-nf-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: extrator-nf-db
          property: connectionString
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://projeto-completo-cyan.vercel.app
      - key: EMBEDDINGS_CACHE_PATH
        value: /app/data/embeddings_cache.pkl
    disk:
      name: rag-data
      mountPath: /app/data
      sizeGB: 1

databases:
  - name: extrator-nf-db
    plan: free
    databaseName: financeiro
    user: financeiro
    ipAllowList: []