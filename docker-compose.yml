version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: financeiro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: financeiro
      POSTGRES_PASSWORD: financeiro123
      POSTGRES_DB: financeiro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeiro -d financeiro"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: financeiro_backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DATABASE_URL: postgresql://financeiro:financeiro123@postgres:5432/financeiro
      EMBEDDINGS_CACHE_PATH: /app/data/embeddings_cache.pkl
    ports:
      - "8000:8000"
    volumes:
      - rag_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  rag_data:

